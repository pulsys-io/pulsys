# sysctl-pulsys-category1.conf -- "lift kernel-imposed ceilings" only.
#
# These do not change Linux behaviour, they only remove caps that would
# otherwise prevent the proxy or kernel autotune from doing what they
# already want to do.  Each one is uncontroversial; none require A/B
# justification.  Category 2 (behavioural) tunings live in a separate
# file installed only after scripts/sweep_tunings.sh proves they help.
#
# Installed to /etc/sysctl.d/99-pulsys-category1.conf by
# category1-tunings.sh.

# --- TCP buffer ceilings ------------------------------------------------------
# The proxy sets SO_SNDBUF = 4 MiB on every accepted socket
# (cmd/pulsys/main.go via cfg.SocketSendBuf).  The default rmem_max /
# wmem_max on AL2023 is well below 4 MiB and would silently clamp our
# explicit setsockopt.  These match what tcp_sndbuf_autotune is allowed
# to reach.
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728

# --- Connection acceptance ceilings -------------------------------------------
# somaxconn caps the listen backlog passed to listen(2).  Without this,
# Linux silently clamps to 4096 -- fine until a burst of CI machines
# hits a freshly-restarted proxy simultaneously.
net.core.somaxconn = 65535

# Per-CPU ingress packet queue depth before packets are dropped on a
# softirq spike.  Default 1000 is cramped on 10+ Gbps NICs.
net.core.netdev_max_backlog = 16384

# SYN queue under burst.  Default 1024 is small for CI fan-in.
net.ipv4.tcp_max_syn_backlog = 8192

# --- File descriptor ceilings -------------------------------------------------
# We want to be able to keep thousands of cached *os.File handles open
# (see internal/cache/bodyhandle.go's LRU) plus many keep-alive
# connections.  systemd-level nofile is also raised via
# limits-pulsys.conf and the systemd unit's LimitNOFILE.
fs.file-max = 4194304
fs.nr_open  = 4194304
