# sysctl-pulsys-category2.conf -- BEHAVIOURAL kernel tunings.
#
# Unlike Category 1 (sysctl-pulsys-category1.conf), every knob in this
# file CHANGES Linux's default behaviour for a packet, a flow, or a
# scheduling decision.  Each one therefore requires evidence before being
# enabled, captured in the generated sweep report (tmp/bench/tunings-report.md;
# rationale in docs/internals.md).
#
# Default state of this file: EMPTY (except for comments).  When a sweep
# run identifies a survivor, add the matching sysctl line here with a
# comment of the form:
#
#     # sweep <YYYY-MM-DD> commit <sha> delta +X.Y% (payload=..., conns=...)
#     net.ipv4.tcp_congestion_control = bbr
#
# The category2-tunings.sh script installs this file as
# /etc/sysctl.d/99-pulsys-category2.conf and reapplies sysctl --system.
#
# Non-sysctl tunings (cpufreq governor, THP, RPS bitmasks, irqbalance)
# live in category2-tunings.sh directly because they cannot be expressed
# in sysctl form.  Same rule applies: only enable after the sweep proves
# the gain.

# --- survivors (filled in after sweep runs) -------------------------------
# Until the first sweep has been run and reviewed, this file is empty.
# Re-baking the AMI without populating this file produces a "tuned" image
# that is functionally identical to the stock image; that is intentional
# so that the build pipeline works end-to-end before any real survivors
# have been picked.
