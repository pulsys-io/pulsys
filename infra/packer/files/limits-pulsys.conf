# limits-pulsys.conf -- PAM-style ulimits for the pulsys user.
#
# The systemd unit already sets LimitNOFILE explicitly, so this file
# matters mainly for interactive sessions (SSM shell, sweep harness)
# that exercise the proxy outside of systemd.
#
# Installed to /etc/security/limits.d/99-pulsys.conf by
# category1-tunings.sh.

*               soft    nofile          1048576
*               hard    nofile          1048576
root            soft    nofile          1048576
root            hard    nofile          1048576
