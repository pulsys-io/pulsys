# pulsys.conf — nginx edge for docker compose (console on :3000 → :80).
#
# Proxies /auth/* and /admin/* to pulsys admin listener; serves the
# exported admin SPA for all other paths. HF model cache proxy stays on
# :8080 directly.

upstream pulsys_admin {
    server pulsys:6060;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 32m;

    # Only the four real backend auth routes are proxied; every other
    # /auth/* path (notably /auth/oidc/callback) is an SPA page served from
    # the static export below.
    location = /auth/oidc/config { proxy_pass http://pulsys_admin; include /etc/nginx/conf.d/pulsys_proxy_headers.inc; }
    location = /auth/csrf        { proxy_pass http://pulsys_admin; include /etc/nginx/conf.d/pulsys_proxy_headers.inc; }
    location = /auth/session     { proxy_pass http://pulsys_admin; include /etc/nginx/conf.d/pulsys_proxy_headers.inc; }
    location = /auth/logout      { proxy_pass http://pulsys_admin; include /etc/nginx/conf.d/pulsys_proxy_headers.inc; }

    location /admin/ {
        include /etc/nginx/conf.d/pulsys_proxy_headers.inc;
        proxy_pass http://pulsys_admin;
    }

    location = /metrics {
        proxy_pass http://pulsys_admin;
    }

    location = /healthz {
        proxy_pass http://pulsys_admin;
    }

    location / {
        root /var/www/pulsys-admin;
        try_files $uri $uri.html $uri/ /index.html;
    }
}
