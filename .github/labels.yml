# Triage label taxonomy, synced by .github/workflows/labels.yml.
# Grouped by prefix so the issue list stays scannable.

# --- type ---
- name: "type/bug"
  color: "d73a4a"
  description: "Something is not working"
- name: "type/enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "type/docs"
  color: "0075ca"
  description: "Documentation"
- name: "type/security"
  color: "b60205"
  description: "Security-relevant"
- name: "type/refactor"
  color: "fbca04"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "type/test"
  color: "fef2c0"
  description: "Tests and test infrastructure"

# --- area ---
- name: "area/data-plane"
  color: "1d76db"
  description: "Cache / proxy hot path"
- name: "area/admin-plane"
  color: "1d76db"
  description: "Pulsys admin API / auth / registry"
- name: "area/helm"
  color: "1d76db"
  description: "Helm chart"
- name: "area/aws"
  color: "1d76db"
  description: "AWS CDK reference deploy"
- name: "area/ci"
  color: "1d76db"
  description: "CI / release / supply chain"
- name: "area/website"
  color: "1d76db"
  description: "Marketing / docs site"

# --- triage / lifecycle ---
- name: "needs-triage"
  color: "ededed"
  description: "Awaiting maintainer triage"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is wanted"
- name: "blocked"
  color: "e99695"
  description: "Blocked on something else"
- name: "stale"
  color: "cccccc"
  description: "No activity; will be closed if it remains inactive"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already reported"

# --- priority ---
- name: "priority/critical"
  color: "b60205"
  description: "Drop-everything"
- name: "priority/high"
  color: "d93f0b"
  description: "Should be addressed soon"
- name: "priority/low"
  color: "0e8a16"
  description: "Nice to have"
