# security: supply-chain and vulnerability scanning.
#
# Three independent surfaces are scanned: the Go module, the JS/TS
# workspaces (root, website, admin-ui, infra/cdk), and the container
# filesystem (Trivy). Each runs in its own job so a flaky scanner
# doesn't block the others.
#
# This workflow is informational on PRs (it surfaces a finding so
# reviewers can decide) and blocking on `main` (a green main means
# no known-critical CVEs in any of the four trees).
#
# An SBOM is published as an artifact on every successful run so
# downstream audit / customer-question loops can fetch the exact
# bill of materials for any commit.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays at 09:13 UTC. Fresh CVEs typically land late in the
    # prior week's vendor advisory cycle.
    - cron: '13 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: go vulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.12'
          cache: true

      - name: install govulncheck
        # Full semver = pinned for Go modules (module proxy verifies hashes).
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: run govulncheck
        run: govulncheck -test ./...

  npm-audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - website
          - admin-ui
          - infra/cdk
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: install
        working-directory: ${{ matrix.workspace }}
        run: npm ci --ignore-scripts

      - name: audit (high+ blocks, lower informational)
        working-directory: ${{ matrix.workspace }}
        run: |
          # Run audit twice: first informational at moderate, second
          # blocking at high. This pattern lets a moderate finding
          # land in the build log without failing the workflow,
          # while a high-severity finding fails fast.
          set +e
          npm audit --audit-level=moderate --json > audit.json
          jq -r '.metadata.vulnerabilities | to_entries[] | "  \(.key): \(.value)"' audit.json || cat audit.json
          set -e
          block_level=high
          # Astro/vite/esbuild chain has no upstream fix yet for
          # GHSA-gv7w-rqvm-qjhr; block only critical on the site.
          if [ "${{ matrix.workspace }}" = website ]; then
            block_level=critical
          fi
          npm audit --audit-level="${block_level}"

  trivy-fs:
    name: trivy filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

  sbom:
    name: sbom (syft)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: generate spdx sbom
        run: syft dir:. -o spdx-json=sbom.spdx.json

      - name: upload sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90
