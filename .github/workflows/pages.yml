# Build the Astro marketing site and deploy it to GitHub Pages.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'docs/results/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Astro >= 5.15 requires Node >= 22.12.
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: install
        working-directory: website
        run: npm ci
      - name: build
        working-directory: website
        env:
          PUBLIC_REPO_URL: https://github.com/pulsys-io/pulsys
          # Served at the pulsys.io custom domain root (Settings -> Pages).
          PUBLIC_SITE_URL: https://pulsys.io
          PUBLIC_BASE_PATH: /
        run: npm run build
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
