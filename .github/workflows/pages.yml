# Build the Astro marketing site and deploy it to GitHub Pages.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'docs/results/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Astro >= 5.15 requires Node >= 22.12.
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: install
        working-directory: website
        run: npm ci
      - name: build
        working-directory: website
        env:
          PUBLIC_REPO_URL: https://github.com/pulsys-io/pulsys
          # Served at the pulsys.io custom domain root (Settings -> Pages).
          PUBLIC_SITE_URL: https://pulsys.io
          PUBLIC_BASE_PATH: /
        run: npm run build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
