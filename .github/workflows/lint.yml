# Go linting + static security analysis: golangci-lint and gosec.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.12'
          cache: true
      - name: gofmt -s check
        run: |
          unformatted="$(gofmt -s -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt -s found unformatted files:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      # golangci-lint v2 (built with a current Go toolchain so it can analyze
      # the go1.25 module). only-new-issues ratchets quality: the curated
      # linter set is enforced on changed code without retroactively failing on
      # pre-existing findings in this mature codebase.
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          only-new-issues: true

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read            # CodeQL upload-sarif telemetry
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.12'
          cache: true
      - name: run gosec
        uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.28.0
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: gosec.sarif
