# Go linting + static security analysis: golangci-lint and gosec.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.12'
          cache: true
      - name: gofmt -s check
        run: |
          unformatted="$(gofmt -s -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt -s found unformatted files:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      # golangci-lint v2 (built with a current Go toolchain so it can analyze
      # the go1.25 module). only-new-issues ratchets quality: the curated
      # linter set is enforced on changed code without retroactively failing on
      # pre-existing findings in this mature codebase.
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.12.2
          only-new-issues: true

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read            # CodeQL upload-sarif telemetry
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.12'
          cache: true
      - name: run gosec
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: gosec.sarif
