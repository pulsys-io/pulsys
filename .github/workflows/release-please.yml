# Automated SemVer releases.
#
# On every push to main, release-please maintains a "release PR" that updates
# CHANGELOG.md + the version in .release-please-manifest.json from the
# Conventional-Commit history. Merging that PR creates the git tag + GitHub
# release, which in turn triggers release.yml (GoReleaser).
#
# Stays on v0.x.y until the API/CLI stabilizes (bump-minor-pre-major).
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create release PR branches + tags
      pull-requests: write   # open/update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
