# OpenSSF Scorecard: continuously grades the repo's security posture
# (branch protection, token permissions, pinned deps, signing, etc.) and
# publishes results to the Scorecard dashboard + code scanning.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '21 2 * * 1'   # weekly
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read            # CodeQL upload-sarif telemetry
      contents: read
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to the public dashboard
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: results.sarif
