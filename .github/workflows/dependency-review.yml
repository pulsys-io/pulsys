# Dependency review: flags vulnerable or disallowed-license dependencies
# introduced by a pull request before they land on main.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: dependency-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Reject copyleft licenses incompatible with Apache-2.0 redistribution.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
