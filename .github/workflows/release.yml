# Release pipeline. Fires on the tag that release-please pushes (vX.Y.Z).
# Builds + signs binaries and images with GoReleaser, then attaches SLSA build
# provenance for the released artifacts.
# NOTE: actions are SHA-pinned in the supply-chain hardening pass.

name: release

on:
  push:
    tags: ['v*']
  # Tags pushed by release-please use GITHUB_TOKEN, which never triggers
  # other workflows; run this manually against the tag ref after a release
  # PR merges (gh workflow run release.yml --ref vX.Y.Z).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release + upload assets
      packages: write   # push images to GHCR
      id-token: write   # keyless cosign signing (OIDC)
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          check-latest: true

      - name: set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: run goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: export artifact hashes for provenance
        id: hashes
        env:
          ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail
          checksum_file="$(echo "$ARTIFACTS" | jq -r '.[] | select(.type=="Checksum") | .path' | head -n1)"
          echo "hashes=$(base64 -w0 < "$checksum_file")" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: [goreleaser]
    permissions:
      actions: read
      id-token: write
      contents: write
    # MUST be a vX.Y.Z tag, not a SHA: the generator derives its builder
    # binary from the tag and hard-fails on commit refs. Scorecard exempts
    # slsa-framework from hash-pinning for exactly this reason.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      upload-assets: true
