# realhf: nightly CI that hits huggingface.co directly.
#
# This is the truth-loop for HF-wire compatibility: the read tests
# fetch known fixtures from huggingface.co (direct and through a
# local Pulsys proxy) and assert byte-for-byte equality. They use only
# public repos, so no credentials are configured in CI.
#
# Write tests (which create throwaway repos on a real HF account and so
# need an HF_TOKEN) are intentionally NOT run in CI to keep secrets out
# of the pipeline. Run them locally instead:
#
#   HF_INTEGRATION_REAL=1 HF_INTEGRATION_REAL_WRITE=1 HF_TOKEN=hf_... \
#     go test -tags realhf -run 'TestRealHF_PrivateRepoRoundtrip' ./internal/realhf/...

name: realhf

on:
  schedule:
    # Daily at 11:23 UTC. Off-peak for HF in both US and EU.
    - cron: '23 11 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: realhf
  cancel-in-progress: false

jobs:
  read-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: run read tests against huggingface.co
        env:
          HF_INTEGRATION_REAL: '1'
        run: |
          go test -tags realhf -count=1 -timeout 5m \
            -run 'TestRealHF_(DirectDownloadPublicFile|ProxyDownloadPublicFile|ParallelRangeRoundtrip)' \
            ./internal/realhf/...
