name: Feature request
description: Suggest an idea or enhancement for pulsys
title: "feat: "
labels: ["type/enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve pulsys! For open-ended ideas or questions,
        consider starting a
        [Discussion](https://github.com/pulsys-io/pulsys/discussions) instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior, flag, config, or API.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Data plane (cache / proxy)
        - Admin plane (Pulsys)
        - Helm chart
        - Benchmark harness (infra/cdk)
        - CLI (pulsys-db)
        - Docs
        - Other / not sure
    validations:
      required: true
